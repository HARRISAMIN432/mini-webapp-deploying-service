version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# ShipStack — Nginx Reverse Proxy
#
# Usage (Windows PowerShell from repo root):
#   docker compose -f docker-compose.proxy.yml up -d
#   docker compose -f docker-compose.proxy.yml down
#
# The proxy listens on port 80 and routes <subdomain>.localhost → container.
# Per-deployment config files are written to ./infra/nginx/conf.d/ by the
# backend nginx.service.ts, then nginx is signaled to reload in-process.
# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: shipstack-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Base config (read-only)
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Dynamic per-deployment configs (writable by host, read by nginx)
      - ./infra/nginx/conf.d:/etc/nginx/conf.d
    # Join the same Docker network so nginx can reach app containers by name
    network_mode: host
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
