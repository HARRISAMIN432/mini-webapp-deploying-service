version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: shipstack-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - type: bind
        source: C:\shipstack\nginx
        target: /etc/nginx/conf.d
    extra_hosts:
      - "host-gateway:host-gateway" # ← add this
    command: >
      sh -c "
        rm -f /etc/nginx/conf.d/default.conf &&
        nginx -g 'daemon off;'
      "
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
