##############################################################################
# nginx.conf — ShipStack local reverse proxy
#
# Strategy: wildcard server_name *.localhost
#   • Reads the Host header (e.g. myapp.localhost)
#   • Maps it to a conf.d/<subdomain>.conf upstream
#   • Uses include to pick up dynamically-generated per-deployment configs
#   • Falls back to a 502 when no conf file matches
##############################################################################

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Increase buffer sizes for proxied responses (handles large builds / SSE)
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # SSE / streaming support
    proxy_read_timeout         3600s;
    proxy_send_timeout         3600s;
    proxy_connect_timeout      30s;

    # Gzip
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Dynamic deployment configs ────────────────────────────────────────────
    # Each running deployment gets its own file: conf.d/<subdomain>.conf
    # The backend writes these files and sends SIGHUP / nginx -s reload
    include /etc/nginx/conf.d/*.conf;

    # ── Fallback: catch-all 502 ───────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location / {
            return 502 '{"error":"No deployment found for this subdomain"}';
            add_header Content-Type application/json;
        }
    }
}