##############################################################################
# docker-compose.proxy.yml
#
# Runs a single Nginx container that acts as a reverse proxy for all
# locally-deployed apps.
#
# Usage:
#   docker compose -f docker-compose.proxy.yml up -d
#   docker compose -f docker-compose.proxy.yml down
#
# On Windows:
#   Run from the project root (where this file lives).
#   Docker Desktop must be running.
#
# How dynamic reloads work:
#   The backend writes config files into ./infra/nginx/conf.d/
#   Then calls:  docker exec shipstack-proxy nginx -s reload
#   Nginx picks up the new config without downtime.
#
# Port mapping:
#   Host port 80  →  Nginx listens for *.localhost requests
#
# NOTE: On Windows, *.localhost resolves to 127.0.0.1 via the OS resolver,
#       so  http://myapp.localhost  will hit port 80 on the host, which is
#       forwarded into this container.
##############################################################################

services:
  proxy:
    image: nginx:1.25-alpine
    container_name: shipstack-proxy
    restart: unless-stopped

    ports:
      # Expose on 80 so that http://myapp.localhost works without a port suffix
      - "80:80"

    volumes:
      # Base nginx configuration (read-only)
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # proxy_params helper (read-only)
      - ./infra/nginx/proxy_params:/etc/nginx/proxy_params:ro
      # Dynamic per-deployment configs (read-write so the backend can write here)
      - ./infra/nginx/conf.d:/etc/nginx/conf.d

    # Keep a network alias so containers on the same bridge can refer to it
    networks:
      - shipstack-net

    # Health check: nginx responds on /health (a minimal location we add below)
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  shipstack-net:
    name: shipstack-net
    driver: bridge
